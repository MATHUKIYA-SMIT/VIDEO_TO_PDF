name: Backend CI/CD

on:
  push:
    branches:
      - main

    paths:
      - 'backend/**'

jobs:

  backend:

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - name: Syntax Check
        run: node --check server.js

      - name: Install Dependencies
        run: npm install

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Backend Image
        run: |
          docker build \
            -t ${{ secrets.DOCKER_USERNAME }}/video-to-pdf-backend:v${{ github.run_number }} \
            .

      - name: Tag Latest
        run: |
          docker tag \
          ${{ secrets.DOCKER_USERNAME }}/video-to-pdf-backend:v${{ github.run_number }} \
          ${{ secrets.DOCKER_USERNAME }}/video-to-pdf-backend:latest

      - name: Push Images
        run: |
          docker push \
          ${{ secrets.DOCKER_USERNAME }}/video-to-pdf-backend:v${{ github.run_number }}

          docker push \
          ${{ secrets.DOCKER_USERNAME }}/video-to-pdf-backend:latest

      - name: Trigger Backend Render
        run: |
          curl -X POST ${{ secrets.BACKEND_RENDER_HOOK }}