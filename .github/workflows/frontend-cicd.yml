name: Frontend CI/CD

on:
  push:
    branches:
      - main

    paths:
      - 'frontend/**'

jobs:

  frontend:

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - run: npm run build

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Frontend Image
        run: |
          docker build \
            -t ${{ secrets.DOCKER_USERNAME }}/video-to-pdf-frontend:v${{ github.run_number }} \
            .

      - name: Tag Latest
        run: |
          docker tag \
          ${{ secrets.DOCKER_USERNAME }}/video-to-pdf-frontend:v${{ github.run_number }} \
          ${{ secrets.DOCKER_USERNAME }}/video-to-pdf-frontend:latest

      - name: Push Images
        run: |
          docker push \
          ${{ secrets.DOCKER_USERNAME }}/video-to-pdf-frontend:v${{ github.run_number }}

          docker push \
          ${{ secrets.DOCKER_USERNAME }}/video-to-pdf-frontend:latest

      - name: Trigger Frontend Render
        run: |
          curl -X POST ${{ secrets.FRONTEND_RENDER_HOOK }}